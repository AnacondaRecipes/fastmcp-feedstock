{% set name = "fastmcp" %}
{% set version = "3.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/fastmcp-{{ version }}.tar.gz
  sha256: db184b5391a31199323766a3abf3a8bfbb8010479f77eca84c0e554f18655c48

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - fastmcp = fastmcp.cli:app


requirements:
  host:
    - python
    - hatchling
    - uv-dynamic-versioning >=0.7.0
    - pip
  run:
    - python
    - python-dotenv >=1.1.0
    - exceptiongroup >=1.2.2
    - httpx >=0.28.1,<1.0
    - mcp >=1.24,<2.0
    - openapi-pydantic >=0.5.1
    - opentelemetry-api >=1.20.0
    - packaging >=24.0
    - platformdirs >=4.0.0
    - rich >=13.9.4
    - cyclopts >=4.0.0
    - authlib >=1.6.5
    - pydantic >=2.11.7
    - pyperclip >=1.9.0
    - py-key-value-aio >=0.4.4,<0.5.0
    - uvicorn >=0.35
    - websockets >=15.0.1
    - jsonschema-path >=0.3.4
    - jsonref >=1.1.0
    - uncalled-for >=0.2.0
    - watchfiles >=1.0.0
    # py-key-value-aio[filetree]
    - aiofiles
    - anyio
    # py-key-value-aio[memory]
    - cachetools >=6.0.0
    # py-key-value-aio[keyring]
    - keyring >=25.6.0
    # pydantic[email]
    - email-validator
  run_constrained:
    - anthropic >=0.40.0  # anthropic
    - prefab-ui >=0.6.0  # apps
    - azure-identity >=1.16.0  # azure
    - pydantic-monty >=0.0.7,<0.0.8  # code-mode
    - google-genai >=1.18.0  # gemini
    - openai >=1.102.0  # openai
    - pydocket >=0.18.0  # tasks

test:
  imports:
    - fastmcp
  requires:
    - pip
  commands:
    - pip check
    - fastmcp --help

about:
  summary: The fast, Pythonic way to build MCP servers.
  description: |
    FastMCP is the standard framework for building MCP applications.
    The Model Context Protocol (MCP) connects LLMs to tools and data. 
    FastMCP gives you everything you need to go from prototype to production 
  home: https://github.com/jlowin/fastmcp
  license: Apache-2.0
  license_file: LICENSE
  license_family: Apache
  dev_url: https://github.com/jlowin/fastmcp
  doc_url: https://gofastmcp.com/getting-started/welcome

